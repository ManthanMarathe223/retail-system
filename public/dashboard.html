<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard — Retail Management System</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <!-- App styles -->
    <link href="css/styles.css" rel="stylesheet" />
</head>

<body>

    <!-- Toast container -->
    <div id="toast-container"></div>

    <!-- ── NAVBAR ──────────────────────────────────── -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-0">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/home.html">
                <i class="bi bi-shop me-2"></i>Retail MS
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto gap-1">
                    <li class="nav-item">
                        <a class="nav-link" href="/home.html">
                            <i class="bi bi-house me-1"></i>Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/dashboard.html">
                            <i class="bi bi-speedometer2 me-1"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/suppliers.html">
                            <i class="bi bi-truck me-1"></i>Suppliers
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/products.html">
                            <i class="bi bi-box-seam me-1"></i>Products
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/customers.html">
                            <i class="bi bi-people me-1"></i>Customers
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/stores.html">
                            <i class="bi bi-building me-1"></i>Stores
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/employees.html">
                            <i class="bi bi-person-badge me-1"></i>Employees
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/orders.html">
                            <i class="bi bi-cart3 me-1"></i>Orders
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4 animate-fade-in">
        <h2 class="mb-1 fw-bold text-dark">
            <i class="bi bi-speedometer2 me-2 text-primary"></i>Dashboard
        </h2>
        <p class="text-muted mb-4">Live overview of your retail system</p>

        <!-- ── STAT CARDS ──────────────────────────────── -->
        <div class="row g-3 mb-4">
            <div class="col-6 col-md-4 col-lg-2">
                <div class="card text-center h-100 stat-card">
                    <div class="card-body py-3">
                        <i class="bi bi-truck fs-3 text-primary mb-2 d-block"></i>
                        <div class="stat-number fw-bold fs-3 text-dark" id="stat-suppliers">—</div>
                        <div class="text-muted small">Suppliers</div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-4 col-lg-2">
                <div class="card text-center h-100 stat-card">
                    <div class="card-body py-3">
                        <i class="bi bi-box-seam fs-3 text-success mb-2 d-block"></i>
                        <div class="stat-number fw-bold fs-3 text-dark" id="stat-products">—</div>
                        <div class="text-muted small">Products</div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-4 col-lg-2">
                <div class="card text-center h-100 stat-card">
                    <div class="card-body py-3">
                        <i class="bi bi-people fs-3 text-info mb-2 d-block"></i>
                        <div class="stat-number fw-bold fs-3 text-dark" id="stat-customers">—</div>
                        <div class="text-muted small">Customers</div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-4 col-lg-2">
                <div class="card text-center h-100 stat-card">
                    <div class="card-body py-3">
                        <i class="bi bi-building fs-3 text-warning mb-2 d-block"></i>
                        <div class="stat-number fw-bold fs-3 text-dark" id="stat-stores">—</div>
                        <div class="text-muted small">Stores</div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-4 col-lg-2">
                <div class="card text-center h-100 stat-card">
                    <div class="card-body py-3">
                        <i class="bi bi-person-badge fs-3 text-danger mb-2 d-block"></i>
                        <div class="stat-number fw-bold fs-3 text-dark" id="stat-employees">—</div>
                        <div class="text-muted small">Employees</div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-4 col-lg-2">
                <div class="card text-center h-100 stat-card">
                    <div class="card-body py-3">
                        <i class="bi bi-cart3 fs-3 text-secondary mb-2 d-block"></i>
                        <div class="stat-number fw-bold fs-3 text-dark" id="stat-orders">—</div>
                        <div class="text-muted small">Orders</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ── CHARTS ROW 1 ────────────────────────────── -->
        <div class="row g-4 mb-4">
            <!-- Products per Type -->
            <div class="col-lg-8">
                <div class="card h-100">
                    <div class="card-header bg-dark text-white">
                        <i class="bi bi-bar-chart-fill me-1"></i>Products per Type
                    </div>
                    <div class="card-body">
                        <canvas id="chartProductsByType" height="120"></canvas>
                    </div>
                </div>
            </div>

            <!-- Employees per Store -->
            <div class="col-lg-4">
                <div class="card h-100">
                    <div class="card-header bg-dark text-white">
                        <i class="bi bi-pie-chart-fill me-1"></i>Employees per Store
                    </div>
                    <div class="card-body d-flex align-items-center justify-content-center">
                        <canvas id="chartEmployeesByStore" height="200"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- ── CHARTS ROW 2 ────────────────────────────── -->
        <div class="row g-4">
            <!-- Revenue per Store -->
            <div class="col-12">
                <div class="card">
                    <div class="card-header bg-dark text-white">
                        <i class="bi bi-graph-up-arrow me-1"></i>Revenue per Store (₹)
                    </div>
                    <div class="card-body">
                        <canvas id="chartRevenueByStore" height="80"></canvas>
                    </div>
                </div>
            </div>
        </div>

    </div><!-- /container -->

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <!-- App scripts (load order matters: api → ui → page logic) -->
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/dashboard.js"></script>

</body>

</html>
