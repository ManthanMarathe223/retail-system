<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customers — Retail Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="css/styles.css" rel="stylesheet" />
</head>

<body>

    <!-- Toast container -->
    <div id="toast-container"></div>

    <!-- ── NAVBAR ──────────────────────────────────── -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-0">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/index.html">
                <i class="bi bi-shop me-2"></i>Retail MS
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto gap-1">
                    <li class="nav-item"><a class="nav-link" href="/index.html"><i
                                class="bi bi-truck me-1"></i>Suppliers</a></li>
                    <li class="nav-item"><a class="nav-link" href="/products.html"><i
                                class="bi bi-box-seam me-1"></i>Products</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/customers.html"><i
                                class="bi bi-people me-1"></i>Customers</a></li>
                    <li class="nav-item"><a class="nav-link" href="/stores.html"><i
                                class="bi bi-building me-1"></i>Stores</a></li>
                    <li class="nav-item"><a class="nav-link" href="/employees.html"><i
                                class="bi bi-person-badge me-1"></i>Employees</a></li>
                    <li class="nav-item"><a class="nav-link" href="/orders.html"><i
                                class="bi bi-cart3 me-1"></i>Orders</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <h2 class="mb-1 fw-bold text-dark">
            <i class="bi bi-people me-2 text-info"></i>Customers
        </h2>
        <p class="text-muted mb-4">Manage your customer records</p>

        <!-- ── CUSTOMER FORM ───────────────────────────────── -->
        <div class="card mb-4">
            <div class="card-header bg-info text-white">
                <i class="bi bi-person-plus me-1"></i>
                <span id="formTitle">Add New Customer</span>
            </div>
            <div class="card-body">
                <form id="customerForm">
                    <input type="hidden" id="editMode" value="false" />
                    <div class="row g-3">
                        <div class="col-md-2">
                            <label class="form-label fw-semibold">Customer ID <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="cus_id" placeholder="e.g. 301" required />
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-semibold">First Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="f_name" placeholder="First name" required />
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-semibold">Last Name</label>
                            <input type="text" class="form-control" id="l_name" placeholder="Last name" />
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Phone Number</label>
                            <input type="tel" class="form-control" id="cus_number" placeholder="e.g. 9876543210"
                                maxlength="15" />
                        </div>
                    </div>
                    <div class="mt-3 d-flex gap-2">
                        <button type="submit" class="btn btn-info text-white px-4" id="submitBtn" disabled>
                            <i class="bi bi-save me-1"></i>Save Customer
                        </button>
                        <button type="button" class="btn btn-secondary" id="cancelBtn" onclick="resetForm()" disabled>
                            <i class="bi bi-x-circle me-1"></i>Cancel
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- ── CUSTOMER TABLE ──────────────────────────────── -->
        <div class="card">
            <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                <span><i class="bi bi-table me-1"></i>Customer List</span>
                <span class="badge bg-secondary" id="customerCount">0 customers</span>
            </div>
            <div class="card-body">

                <!-- Search bar -->
                <div class="row g-2 mb-3">
                    <div class="col-md-5">
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-search"></i></span>
                            <input type="text" class="form-control" id="searchName" placeholder="Search by name..." />
                        </div>
                    </div>
                    <div class="col-md-5">
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                            <input type="text" class="form-control" id="searchPhone" placeholder="Search by phone..." />
                        </div>
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-outline-danger w-100" id="clearBtn" onclick="clearSearch()" disabled>
                            <i class="bi bi-x-lg me-1"></i>Clear
                        </button>
                    </div>
                </div>

                <!-- Table -->
                <div class="table-responsive">
                    <table class="table table-bordered table-hover align-middle mb-0">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>First Name</th>
                                <th>Last Name</th>
                                <th>Phone</th>
                                <th class="text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="customerTableBody">
                            <tr>
                                <td colspan="5" class="text-center text-muted py-4">Loading customers...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div><!-- /container -->

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/customers.js"></script>

</body>

</html>
